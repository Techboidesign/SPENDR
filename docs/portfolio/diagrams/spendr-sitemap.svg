<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1500" viewBox="0 0 2200 1500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2200" y2="1500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F7FA"/>
      <stop offset="1" stop-color="#EDEDFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A1A2E" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 42px 'Helvetica Neue', Arial, sans-serif; fill: #1A1A2E; }
      .subtitle { font: 500 18px 'Helvetica Neue', Arial, sans-serif; fill: #6B7280; }
      .section { font: 700 15px 'Helvetica Neue', Arial, sans-serif; fill: #FFFFFF; letter-spacing: 0.04em; }
      .label { font: 600 14px 'Helvetica Neue', Arial, sans-serif; fill: #1A1A2E; }
      .path { font: 500 12px 'Helvetica Neue', Arial, monospace; fill: #6B7280; }
      .note { font: 500 13px 'Helvetica Neue', Arial, sans-serif; fill: #6B7280; }
    </style>
  </defs>
  <rect width="2200" height="1500" fill="url(#bg)"/>
  <text x="80" y="72" class="title">Spendr - Site map</text>
  <text x="80" y="108" class="subtitle">All routes &amp; major surfaces - React Router 7</text>

  <!-- Root -->
  <g filter="url(#shadow)">
    <rect x="960" y="150" width="280" height="64" rx="16" fill="#3E37FF"/>
    <text x="1100" y="190" text-anchor="middle" class="section">SPENDR APP</text>
  </g>
  <line x1="1100" y1="214" x2="1100" y2="250" stroke="#C8C8D8" stroke-width="2"/>

  <!-- Column headers -->
  <text x="180" y="280" class="note">Guest auth</text>
  <text x="620" y="280" class="note">Onboarding (signed in)</text>
  <text x="1180" y="280" class="note">Main app (onboarding complete)</text>
  <text x="1780" y="280" class="note">Settings hub</text>

  <!-- Auth branch -->
  <line x1="1100" y1="250" x2="280" y2="300" stroke="#C8C8D8" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="80" y="300" width="400" height="48" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="104" y="330" class="label">Auth</text>
    <text x="104" y="346" class="path">GuestAuthGuard</text>
  </g>
  <line x1="280" y1="348" x2="280" y2="380" stroke="#C8C8D8" stroke-width="2"/>

  <!-- Auth pages -->
  <g filter="url(#shadow)">
    <rect x="80" y="380" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="104" y="408" class="label">Welcome</text>
    <text x="320" y="408" class="path">/welcome</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="436" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="104" y="464" class="label">Sign up</text>
    <text x="320" y="464" class="path">/signup</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="492" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="104" y="520" class="label">Log in</text>
    <text x="320" y="520" class="path">/login</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="548" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="104" y="576" class="label">Forgot password</text>
    <text x="320" y="576" class="path">/forgot-password</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="604" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="104" y="632" class="label">Auth callback</text>
    <text x="320" y="632" class="path">/auth/callback</text>
  </g>

  <!-- Onboarding branch -->
  <line x1="1100" y1="250" x2="720" y2="300" stroke="#C8C8D8" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="520" y="300" width="400" height="48" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="544" y="330" class="label">Onboarding flow</text>
    <text x="544" y="346" class="path">/onboarding/*</text>
  </g>
  <line x1="720" y1="348" x2="720" y2="380" stroke="#C8C8D8" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="520" y="380" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="544" y="408" class="label">1. Primary goal</text>
    <text x="720" y="408" class="path">/onboarding/goal</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="436" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="544" y="464" class="label">2. Goal setup (target)</text>
    <text x="720" y="464" class="path">/onboarding/goal-setup</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="492" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="544" y="520" class="label">3. Monthly income</text>
    <text x="720" y="520" class="path">/onboarding/monthly-income</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="548" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="544" y="576" class="label">4. Monthly budget</text>
    <text x="720" y="576" class="path">/onboarding/budget</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="604" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="544" y="632" class="label">5. Categories</text>
    <text x="720" y="632" class="path">/onboarding/categories</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="660" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="544" y="688" class="label">6. Notifications</text>
    <text x="720" y="688" class="path">/onboarding/notifications</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="716" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="544" y="744" class="label">7. Name &amp; basics</text>
    <text x="720" y="744" class="path">/onboarding/name-basics</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="520" y="772" width="400" height="44" rx="10" fill="#10B981" fill-opacity="0.15" stroke="#10B981"/>
    <text x="544" y="800" class="label">8. Complete - Launch</text>
    <text x="720" y="800" class="path">/onboarding/complete</text>
  </g>

  <!-- Main app branch -->
  <line x1="1100" y1="250" x2="1280" y2="300" stroke="#C8C8D8" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="1080" y="300" width="400" height="48" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1104" y="330" class="label">RootLayout + tab bar</text>
    <text x="1104" y="346" class="path">AuthGuard</text>
  </g>
  <line x1="1280" y1="348" x2="1280" y2="380" stroke="#C8C8D8" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="1080" y="380" width="400" height="44" rx="10" fill="#3E37FF" fill-opacity="0.12" stroke="#3E37FF"/>
    <text x="1104" y="408" class="label">Home</text>
    <text x="1320" y="408" class="path">/</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="436" width="400" height="44" rx="10" fill="#3E37FF" fill-opacity="0.12" stroke="#3E37FF"/>
    <text x="1104" y="464" class="label">Expenses</text>
    <text x="1320" y="464" class="path">/expenses</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="492" width="400" height="56" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1104" y="516" class="label">- List tab</text>
    <text x="1104" y="536" class="path">Search - filters - swipe - multi-delete</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="556" width="400" height="56" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1104" y="580" class="label">- Insights tab</text>
    <text x="1104" y="600" class="path">Category breakdown (in-screen)</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="624" width="400" height="44" rx="10" fill="#3E37FF" fill-opacity="0.12" stroke="#3E37FF"/>
    <text x="1104" y="652" class="label">Budget &amp; Goals</text>
    <text x="1320" y="652" class="path">/budget</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="680" width="400" height="56" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1104" y="704" class="label">- Focus goal card</text>
    <text x="1104" y="724" class="path">Drag progress - edit goal modal</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="748" width="400" height="56" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1104" y="772" class="label">- Income &amp; budget cards</text>
    <text x="1104" y="792" class="path">Drag limits - category budgets</text>
  </g>

  <!-- Global modal -->
  <line x1="1280" y1="820" x2="1280" y2="860" stroke="#C8C8D8" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="1080" y="860" width="400" height="56" rx="12" fill="#F59E0B" fill-opacity="0.18" stroke="#F59E0B"/>
    <text x="1104" y="884" class="label">FAB (all main tabs)</text>
    <text x="1104" y="904" class="path">Add expense - receipt scan - upload</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1080" y="932" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1104" y="960" class="label">Add / Edit expense modal</text>
    <text x="1104" y="960" class="path"> </text>
  </g>

  <!-- Settings branch -->
  <line x1="1100" y1="250" x2="1880" y2="300" stroke="#C8C8D8" stroke-width="2"/>
  <g filter="url(#shadow)">
    <rect x="1680" y="300" width="400" height="48" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1704" y="330" class="label">Settings hub</text>
    <text x="1704" y="346" class="path">SubPageLayout</text>
  </g>
  <line x1="1880" y1="348" x2="1880" y2="380" stroke="#C8C8D8" stroke-width="2"/>

  <g filter="url(#shadow)">
    <rect x="1680" y="380" width="400" height="44" rx="10" fill="#3E37FF" fill-opacity="0.12" stroke="#3E37FF"/>
    <text x="1704" y="408" class="label">Settings</text>
    <text x="1920" y="408" class="path">/settings</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1680" y="436" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1704" y="464" class="label">Profile</text>
    <text x="1920" y="464" class="path">/settings/profile</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1680" y="492" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1704" y="520" class="label">Help</text>
    <text x="1920" y="520" class="path">/settings/help</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1680" y="548" width="400" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1704" y="576" class="label">Privacy</text>
    <text x="1920" y="576" class="path">/settings/privacy</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1680" y="604" width="400" height="72" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="1704" y="632" class="label">In-app modals</text>
    <text x="1704" y="652" class="path">Currency - categories - erase data</text>
    <text x="1704" y="668" class="path">Appearance - notifications - export</text>
  </g>

  <!-- Legend -->
  <rect x="80" y="1320" width="2040" height="120" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="112" y="1360" class="label">Legend</text>
  <rect x="112" y="1376" width="16" height="16" rx="4" fill="#3E37FF" fill-opacity="0.12" stroke="#3E37FF"/>
  <text x="140" y="1390" class="note">Primary tab route</text>
  <rect x="320" y="1376" width="16" height="16" rx="4" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="348" y="1390" class="note">Nested screen or feature</text>
  <rect x="560" y="1376" width="16" height="16" rx="4" fill="#10B981" fill-opacity="0.15" stroke="#10B981"/>
  <text x="588" y="1390" class="note">Onboarding exit - app</text>
  <rect x="820" y="1376" width="16" height="16" rx="4" fill="#F59E0B" fill-opacity="0.18" stroke="#F59E0B"/>
  <text x="848" y="1390" class="note">Global overlay (FAB / modal)</text>
  <text x="112" y="1420" class="note">Insights live inside Expenses (tab swipe)  -  /insights redirects to Home.</text>
</svg>
